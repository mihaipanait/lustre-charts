# Publish lustre-charts to npm when a version tag is pushed:
#   npm version minor && git push --follow-tags
#
# Uses npm "trusted publishing" (OIDC) — no npm token is stored in this
# repo. One-time setup on npmjs.com (after the package's first manual
# publish): package → Settings → Trusted Publisher → GitHub Actions,
#   organization/user: mihaipanait
#   repository:        lustre-charts
#   workflow filename: release.yml
name: Release to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC token that npm exchanges for publish credentials

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; keep the CLI current.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish
